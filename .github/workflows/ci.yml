name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        # Pure-logic tests only: chunking, RRF fusion, reranker parse fallback,
        # retry predicate. No DB, no live API calls — so CI is fast and deterministic.
        # The Gemini client is lazily constructed, so a dummy key is enough to import.
        env:
          GEMINI_API_KEY: dummy-key-for-ci
        run: pytest -v

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t market-research-agent .
